<VirtualHost *:443>
    ServerAdmin wizice100@yuhs.ac
    ServerName  kbregulation.wizice.com

    DocumentRoot "/home/wizice/kbregulation/www"
    <Location />
        Require ip 124.111.183.218 164.92.102.223 211.244.0.44
    </Location>

    #--- apache 로그 폴더에서 app 폴더로 위치 변경
    #ErrorLog ${APACHE_LOG_DIR}/error.log
    ErrorLog "/home/wizice/kbregulation/log/regulation.error.log"
    CustomLog "/home/wizice/kbregulation/log/regulation.access.log" common

    # TLS 프로토콜 및 암호화 스위트
    SSLProtocol             -all +TLSv1.2 +TLSv1.3
    SSLCipherSuite HIGH:!aNULL:!MD5
    SSLHonorCipherOrder on
    SSLCipherSuite          ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256

    # 성능/보안 옵션
    SSLCompression         off

    # 응답 헤더 강화 및 Server 헤더 제거
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "no-referrer-when-downgrade"
    Header always unset "Server"
    Header always unset "X-Powered-By"

    LogLevel warn
    SSLEngine on
    SSLOptions +FakeBasicAuth +ExportCertData +StrictRequire
    #Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/wizice.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/wizice.com/privkey.pem

    AddDefaultCharset UTF-8

    Header always set Access-Control-Allow-Origin "*"
    Header always set Access-Control-Allow-Credentials "true"
    Header always set Access-Control-Allow-Methods "GET, POST"
    Header always set Access-Control-Allow-Headers "Content-Type, Authorization"

    Alias /static /home/wizice/kbregulation/www/static
    Alias / /home/wizice/kbregulation/www/
    <Directory /home/wizice/kbregulation >
        #Options Indexes FollowSymLinks
        #AllowOverride None
        Require all granted
    </Directory>
    <Directory /home/wizice/kbregulation/www >
        #Options Indexes FollowSymLinks
        #AllowOverride None
        Require all granted
    </Directory>
    <Directory /home/wizice/kbregulation/static >
        #Options Indexes FollowSymLinks
        #AllowOverride None
        Require all granted
    </Directory>
    <Directory /home/wizice/kbregulation/www/static >
        # 모든 오리진 허용
        Header always set Access-Control-Allow-Origin "*"
        Header always set Access-Control-Allow-Methods "GET, HEAD, OPTIONS"
        Header always set Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization, Cache-Control, Pragma"
        Header always set Access-Control-Allow-Credentials "true"
        Header always set Access-Control-Max-Age "86400"
        Require all granted
    </Directory>

#    WSGIDaemonProcess  kbregulations.yuhs.ac processes=5 threads=1 display-name=%{GROUP} user=wizice100 group=wizice100 home=/home/wizice/kbregulation lang='en_US.UTF-8' locale='en_US.UTF-8'
#    WSGIProcessGroup  kbregulations.yuhs.ac
#    WSGIScriptReloading  On
#    WSGIApplicationGroup %{GLOBAL}
#
#    WSGIScriptAlias / /home/wizice/kbregulation/regulation.wsgi
    <If "%{REQUEST_METHOD} == 'OPTIONS'">
        Header always set Content-Length "0"
        Header always set Content-Type "text/plain"
        Require all granted
        SetHandler none
    </If>

    # ===== FastAPI 프록시 설정 =====
    ProxyPreserveHost On
    ProxyRequests Off
    ProxyTimeout 60

#    <Location "/">
#        ProxyPass "http://127.0.0.1:8800/"
#        ProxyPassReverse "http://127.0.0.1:8800/"
#
#        RequestHeader set Host "%{HTTP_HOST}s"
#        RequestHeader set X-Real-IP "%{REMOTE_ADDR}s"
#        RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
#        RequestHeader set X-Forwarded-Proto "https"
#        RequestHeader set X-Forwarded-Host "%{HTTP_HOST}s"
#        RequestHeader set X-Forwarded-Port "443"
#
#        #Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
#        Header always set Access-Control-Allow-Origin "*"
#    </Location>
    <Location "/api/">
        ProxyPass "http://127.0.0.1:8800/api/"
        ProxyPassReverse "http://127.0.0.1:8800/api/"

        Header always set Access-Control-Allow-Origin "*"
        Header always set Access-Control-Allow-Methods "GET, HEAD, OPTIONS"
        Header always set Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization, Cache-Control, Pragma"
        Header always set Access-Control-Allow-Credentials "true"
        Header always set Access-Control-Max-Age "86400"

        RequestHeader set Host "%{HTTP_HOST}s"
        RequestHeader set X-Real-IP "%{REMOTE_ADDR}s"
        RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
        RequestHeader set X-Forwarded-Proto "https"
        RequestHeader set X-Forwarded-Host "%{HTTP_HOST}s"
        RequestHeader set X-Forwarded-Port "443"

        #Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
        Header always set Access-Control-Allow-Origin "*"
    </Location>
    <Location "/gateway">
        ProxyPass "http://127.0.0.1:8800/gateway"
        ProxyPassReverse "http://127.0.0.1:8800/gateway"

        RequestHeader set Host "%{HTTP_HOST}s"
        RequestHeader set X-Real-IP "%{REMOTE_ADDR}s"
        RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
        RequestHeader set X-Forwarded-Proto "https"
        RequestHeader set X-Forwarded-Host "%{HTTP_HOST}s"
        RequestHeader set X-Forwarded-Port "443"
    </Location>
    <Location "/ad">
        ProxyPass "http://127.0.0.1:8800/ad"
        ProxyPassReverse "http://127.0.0.1:8800/ad"

        RequestHeader set Host "%{HTTP_HOST}s"
        RequestHeader set X-Real-IP "%{REMOTE_ADDR}s"
        RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
        RequestHeader set X-Forwarded-Proto "https"
        RequestHeader set X-Forwarded-Host "%{HTTP_HOST}s"
        RequestHeader set X-Forwarded-Port "443"

        #Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
        Header always set Access-Control-Allow-Origin "*"
    </Location>
</VirtualHost>

<VirtualHost *:443>
    ServerName kbregulationeditor.wizice.com

    # IP 접근 제한을 Location 블록으로 감싸기
    <Location />
        Require ip 124.111.183.218
    </Location>

    # TLS 프로토콜 및 암호화 스위트
    SSLProtocol             -all +TLSv1.2 +TLSv1.3
    SSLCipherSuite HIGH:!aNULL:!MD5
    SSLHonorCipherOrder on
    SSLCipherSuite          ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256

    # 성능/보안 옵션
    SSLCompression         off

    # 응답 헤더 강화 및 Server 헤더 제거
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "no-referrer-when-downgrade"
    Header always unset "Server"
    Header always unset "X-Powered-By"

    # SSL 엔진 활성화
    SSLEngine on
    #Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/wizice.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/wizice.com/privkey.pem

    # SSL 프로토콜 및 암호화 설정
    SSLProtocol -all +TLSv1.2 +TLSv1.3
    SSLCipherSuite HIGH:!aNULL:!MD5
    SSLHonorCipherOrder on

    # 로깅
    ErrorLog /var/log/httpd/kbregulation-error.log
    CustomLog /var/log/httpd/kbregulation-access.log combined

    # Static 파일 설정 (FastAPI보다 먼저 처리)
    Alias /static /home/wizice/kbregulation/fastapi/static
    <Directory /home/wizice/kbregulation/fastapi/static>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # 캐시 설정 (30일)
        <FilesMatch "\.(jpg|jpeg|png|gif|css|js|ico|woff|woff2|ttf|svg|bmp|html|htm)$">
            Header set Cache-Control "public, max-age=2592000, immutable"
        </FilesMatch>

        Header set X-Content-Type-Options "nosniff"
    </Directory>

    # FastAPI 프록시 설정
    ProxyPreserveHost On
    ProxyRequests Off

    # WebSocket 지원
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*)           ws://127.0.0.1:8800/$1 [P,L]
    RewriteCond %{HTTP:Upgrade} !=websocket [NC]
    RewriteRule /(.*)           http://127.0.0.1:8800/$1 [P,L]

    # 일반 HTTP 프록시
    ProxyPass /static !
    ProxyPass / http://127.0.0.1:8800/ timeout=120
    ProxyPassReverse / http://127.0.0.1:8800/

    # 프록시 헤더 설정
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    # 파일 업로드 크기
    LimitRequestBody 838860800

    Header always set Access-Control-Allow-Origin "https://kbregulationeditor.wizice.com"
    Header always set Access-Control-Allow-Credentials "true"
    Header always set Access-Control-Allow-Methods "GET, POST"
    Header always set Access-Control-Allow-Headers "Content-Type, Authorization"

    <If "%{REQUEST_METHOD} == 'OPTIONS'">
        Header always set Content-Length "0"
        Header always set Content-Type "text/plain"
        Require all granted
        SetHandler none
    </If>
    <Location "/api/">
        ProxyPass "http://127.0.0.1:8800/api/"
        ProxyPassReverse "http://127.0.0.1:8800/api/"

        RequestHeader set Host "%{HTTP_HOST}s"
        RequestHeader set X-Real-IP "%{REMOTE_ADDR}s"
        RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
        RequestHeader set X-Forwarded-Proto "https"
        RequestHeader set X-Forwarded-Host "%{HTTP_HOST}s"
        RequestHeader set X-Forwarded-Port "443"
    </Location>
</VirtualHost>

