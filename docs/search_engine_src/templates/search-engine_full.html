{% extends "common/base.html" %}

{% block styles %}
<link rel="stylesheet" href="/static/styles.css">
<style>
    /* 단색 깔끔한 디자인 */
    body {
        background: #f8f9fa;
        margin: 0;
        padding: 0;
    }

    .page-container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
        background: white;
    }

    .reindex-section {
        margin-bottom: 30px;
        padding: 20px;
        border: 1px solid #dee2e6;
        border-radius: 8px;
        background: #f8f9fa;
    }

    .reindex-section h3 {
        margin-top: 0;
        color: #495057;
        font-size: 18px;
        font-weight: 600;
    }

    .reindex-buttons {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 15px;
    }

    .btn-reindex {
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-reindex-primary {
        background: #007bff;
        color: white;
    }

    .btn-reindex-primary:hover {
        background: #0056b3;
    }

    .btn-reindex-secondary {
        background: #6c757d;
        color: white;
    }

    .btn-reindex-secondary:hover {
        background: #545b62;
    }

    .btn-reindex-danger {
        background: #dc3545;
        color: white;
    }

    .btn-reindex-danger:hover {
        background: #c82333;
    }

    .btn-reindex:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .status-card {
        padding: 15px;
        background: white;
        border: 1px solid #dee2e6;
        border-radius: 5px;
        margin-bottom: 10px;
    }

    .status-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        border-bottom: 1px solid #f0f0f0;
    }

    .status-row:last-child {
        border-bottom: none;
    }

    .status-label {
        font-weight: 600;
        color: #495057;
    }

    .status-value {
        color: #28a745;
        font-weight: 500;
    }

    .status-error {
        color: #dc3545;
    }

    .loading-indicator {
        display: none;
        margin-top: 15px;
        padding: 10px;
        background: #e9ecef;
        border-radius: 5px;
        text-align: center;
        color: #495057;
    }

    .loading-indicator.active {
        display: block;
    }

    .message-box {
        margin-top: 15px;
        padding: 12px;
        border-radius: 5px;
        display: none;
    }

    .message-box.success {
        background: #d4edda;
        border: 1px solid #c3e6cb;
        color: #155724;
        display: block;
    }

    .message-box.error {
        background: #f8d7da;
        border: 1px solid #f5c6cb;
        color: #721c24;
        display: block;
    }
</style>
{% endblock %}

{% block content %}
<div class="page-container">
    <h2 style="margin-bottom: 2rem;">검색 엔진 관리 (Elasticsearch)</h2>

    <!-- 인덱스 상태 섹션 -->
    <div class="reindex-section">
        <h3>📊 인덱스 상태</h3>
        <div id="statusContainer">
            <button class="btn-reindex btn-reindex-secondary" onclick="loadStatus()">상태 새로고침</button>
            <div id="statusCards" style="margin-top: 15px;">
                <p style="color: #6c757d;">상태 새로고침 버튼을 클릭하세요.</p>
            </div>
        </div>
    </div>

    <!-- 재색인 섹션 -->
    <div class="reindex-section">
        <h3>🔄 Elasticsearch 재색인</h3>
        <p style="color: #6c757d; margin-bottom: 15px;">
            규정을 수정한 후 검색 결과에 반영하려면 재색인을 실행하세요.
        </p>

        <div class="reindex-buttons">
            <button class="btn-reindex btn-reindex-primary" onclick="reindexAllRules()">
                모든 규정 재색인
            </button>
            <button class="btn-reindex btn-reindex-primary" onclick="reindexAllArticles()">
                모든 조문 재색인
            </button>
            <button class="btn-reindex btn-reindex-primary" onclick="reindexAllAppendices()">
                모든 부록 재색인
            </button>
            <button class="btn-reindex btn-reindex-danger" onclick="reindexAll()">
                전체 재색인 (전체)
            </button>
        </div>

        <div id="reindexLoading" class="loading-indicator">
            재색인 작업이 백그라운드에서 진행 중입니다...
        </div>

        <div id="reindexMessage" class="message-box"></div>
    </div>
</div>

<script>
// 상태 로드
async function loadStatus() {
    try {
        const response = await fetch('/api/search/es/reindex/status');
        const data = await response.json();

        if (data.success) {
            let html = '<div class="status-card">';
            html += `<div class="status-row"><span class="status-label">업데이트 시간:</span><span class="status-value">${new Date(data.timestamp).toLocaleString('ko-KR')}</span></div>`;
            html += '</div>';

            for (const [name, info] of Object.entries(data.indices)) {
                html += '<div class="status-card">';
                html += `<div class="status-row"><span class="status-label">${name.toUpperCase()}:</span><span class="${info.status === 'available' ? 'status-value' : 'status-error'}">${info.status}</span></div>`;
                html += `<div class="status-row"><span class="status-label">인덱스:</span><span>${info.index}</span></div>`;
                html += `<div class="status-row"><span class="status-label">문서 수:</span><span class="status-value">${info.count.toLocaleString()}</span></div>`;
                if (info.error) {
                    html += `<div class="status-row"><span class="status-label">오류:</span><span class="status-error">${info.error}</span></div>`;
                }
                html += '</div>';
            }

            document.getElementById('statusCards').innerHTML = html;
        } else {
            showMessage('상태를 불러올 수 없습니다.', 'error');
        }
    } catch (error) {
        console.error('Status load error:', error);
        showMessage('상태 조회 중 오류가 발생했습니다: ' + error.message, 'error');
    }
}

// 메시지 표시
function showMessage(message, type = 'success') {
    const messageBox = document.getElementById('reindexMessage');
    messageBox.textContent = message;
    messageBox.className = `message-box ${type}`;

    setTimeout(() => {
        messageBox.className = 'message-box';
    }, 5000);
}

// 로딩 표시
function showLoading(show = true) {
    const loading = document.getElementById('reindexLoading');
    if (show) {
        loading.classList.add('active');
    } else {
        loading.classList.remove('active');
    }
}

// 모든 규정 재색인
async function reindexAllRules() {
    if (!confirm('모든 규정을 재색인하시겠습니까?')) return;

    showLoading(true);
    try {
        const response = await fetch('/api/search/es/reindex/all-rules', {
            method: 'POST'
        });
        const data = await response.json();

        if (data.success) {
            showMessage('규정 재색인이 시작되었습니다. 완료까지 몇 분 소요될 수 있습니다.', 'success');
            setTimeout(loadStatus, 5000);
        } else {
            showMessage('재색인 요청 실패: ' + (data.message || '알 수 없는 오류'), 'error');
        }
    } catch (error) {
        console.error('Reindex error:', error);
        showMessage('재색인 요청 중 오류가 발생했습니다: ' + error.message, 'error');
    } finally {
        showLoading(false);
    }
}

// 모든 조문 재색인
async function reindexAllArticles() {
    if (!confirm('모든 조문을 재색인하시겠습니까?')) return;

    showLoading(true);
    try {
        const response = await fetch('/api/search/es/reindex/all-articles', {
            method: 'POST'
        });
        const data = await response.json();

        if (data.success) {
            showMessage('조문 재색인이 시작되었습니다. 완료까지 몇 분 소요될 수 있습니다.', 'success');
            setTimeout(loadStatus, 5000);
        } else {
            showMessage('재색인 요청 실패: ' + (data.message || '알 수 없는 오류'), 'error');
        }
    } catch (error) {
        console.error('Reindex error:', error);
        showMessage('재색인 요청 중 오류가 발생했습니다: ' + error.message, 'error');
    } finally {
        showLoading(false);
    }
}

// 모든 부록 재색인
async function reindexAllAppendices() {
    if (!confirm('모든 부록을 재색인하시겠습니까?')) return;

    showLoading(true);
    try {
        const response = await fetch('/api/search/es/reindex/all-appendices', {
            method: 'POST'
        });
        const data = await response.json();

        if (data.success) {
            showMessage('부록 재색인이 시작되었습니다. 완료까지 몇 분 소요될 수 있습니다.', 'success');
            setTimeout(loadStatus, 5000);
        } else {
            showMessage('재색인 요청 실패: ' + (data.message || '알 수 없는 오류'), 'error');
        }
    } catch (error) {
        console.error('Reindex error:', error);
        showMessage('재색인 요청 중 오류가 발생했습니다: ' + error.message, 'error');
    } finally {
        showLoading(false);
    }
}

// 전체 재색인
async function reindexAll() {
    if (!confirm('전체 재색인은 시간이 많이 소요됩니다. 계속하시겠습니까?')) return;

    showLoading(true);
    try {
        const response = await fetch('/api/search/es/reindex/all', {
            method: 'POST'
        });
        const data = await response.json();

        if (data.success) {
            showMessage('전체 재색인이 시작되었습니다. 완료까지 10-20분 소요될 수 있습니다.', 'success');
            setTimeout(loadStatus, 10000);
        } else {
            showMessage('재색인 요청 실패: ' + (data.message || '알 수 없는 오류'), 'error');
        }
    } catch (error) {
        console.error('Reindex error:', error);
        showMessage('재색인 요청 중 오류가 발생했습니다: ' + error.message, 'error');
    } finally {
        showLoading(false);
    }
}

// 페이지 로드 시 상태 자동 로드
document.addEventListener('DOMContentLoaded', () => {
    loadStatus();
});
</script>
{% endblock %}
