<script>
function logout() {
    if (confirm('로그아웃 하시겠습니까?')) {
        fetch('/api/v1/auth/logout', {
            method: 'POST',
            credentials: 'include'
        })
        .then(response => response.json())
        .then(data => {
            window.location.href = '/login';
        })
        .catch(error => {
            console.error('로그아웃 오류:', error);
            alert('로그아웃 중 오류가 발생했습니다.');
        });
    }
}
</script>
