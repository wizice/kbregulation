<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>접속 로그 대시보드 - KB신용정보 규정집</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'KB금융체Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f7fa;
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #1e5ba8 0%, #0d4a8f 100%);
            color: white;
            padding: 20px 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 5px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .controls label {
            font-size: 14px;
            font-weight: 500;
            color: #555;
        }

        .controls input, .controls select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .controls button {
            padding: 8px 20px;
            background: #1e5ba8;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .controls button:hover {
            background: #0d4a8f;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .stat-card h3 {
            font-size: 14px;
            color: #888;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: #1e5ba8;
        }

        .chart-container {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .chart-container h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            border-bottom: 2px solid #e9ecef;
        }

        td {
            padding: 12px;
            font-size: 14px;
            border-bottom: 1px solid #e9ecef;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-pc { background: #e3f2fd; color: #1976d2; }
        .badge-mobile { background: #f3e5f5; color: #7b1fa2; }
        .badge-tablet { background: #fff3e0; color: #f57c00; }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        canvas {
            max-height: 300px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>접속 로그 대시보드</h1>
        <p>내부망 규정집 접속 현황 모니터링</p>
    </div>

    <div class="container">
        <!-- 조회 조건 -->
        <div class="controls">
            <div>
                <label>조회 기간:</label>
                <select id="period" onchange="loadDashboard()">
                    <option value="1">최근 1일</option>
                    <option value="7" selected>최근 7일</option>
                    <option value="30">최근 30일</option>
                    <option value="90">최근 90일</option>
                </select>
            </div>
            <button onclick="loadDashboard()">새로고침</button>
            <button onclick="exportToCSV()">CSV 다운로드</button>
        </div>

        <!-- 요약 통계 -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>총 방문 수</h3>
                <div class="value" id="totalVisits">-</div>
            </div>
            <div class="stat-card">
                <h3>순 방문자 (IP)</h3>
                <div class="value" id="uniqueIPs">-</div>
            </div>
            <div class="stat-card">
                <h3>평균 일일 방문</h3>
                <div class="value" id="avgDailyVisits">-</div>
            </div>
            <div class="stat-card">
                <h3>조회 기간</h3>
                <div class="value" id="periodDays" style="font-size: 24px;">7일</div>
            </div>
        </div>

        <!-- 일별 방문 추이 -->
        <div class="chart-container">
            <h2>일별 방문 추이</h2>
            <canvas id="dailyChart"></canvas>
        </div>

        <!-- 디바이스/브라우저 통계 -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
            <div class="chart-container">
                <h2>디바이스별 접속</h2>
                <canvas id="deviceChart"></canvas>
            </div>
            <div class="chart-container">
                <h2>브라우저별 접속</h2>
                <canvas id="browserChart"></canvas>
            </div>
        </div>

        <!-- 인기 페이지 -->
        <div class="chart-container">
            <h2>인기 페이지 TOP 10</h2>
            <table id="topPagesTable">
                <thead>
                    <tr>
                        <th>순위</th>
                        <th>페이지</th>
                        <th>방문 수</th>
                        <th>순 방문자</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- 최근 접속 로그 -->
        <div class="chart-container">
            <h2>최근 접속 로그</h2>
            <table id="recentLogsTable">
                <thead>
                    <tr>
                        <th>시간</th>
                        <th>사용자</th>
                        <th>IP</th>
                        <th>디바이스</th>
                        <th>페이지</th>
                        <th>응답시간</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        let dailyChart, deviceChart, browserChart;

        // 대시보드 로드
        async function loadDashboard() {
            const days = document.getElementById('period').value;
            document.getElementById('periodDays').textContent = `${days}일`;

            try {
                // 통계 요약 조회
                const response = await fetch(`/api/v1/access-logs/stats/summary?days=${days}`);
                const result = await response.json();

                if (!result.success) {
                    throw new Error('통계 조회 실패');
                }

                const data = result.data;

                // 요약 통계 업데이트
                document.getElementById('totalVisits').textContent = data.summary.total_visits.toLocaleString();
                document.getElementById('uniqueIPs').textContent = data.summary.total_unique_ips.toLocaleString();
                document.getElementById('avgDailyVisits').textContent = data.summary.avg_daily_visits.toLocaleString();

                // 일별 차트 업데이트
                updateDailyChart(data.daily_stats);

                // 디바이스 차트 업데이트
                updateDeviceChart(data.device_stats);

                // 브라우저 차트 업데이트
                updateBrowserChart(data.browser_stats);

                // 인기 페이지 테이블 업데이트
                updateTopPagesTable(data.top_pages);

                // 최근 로그 조회
                await loadRecentLogs();

            } catch (error) {
                console.error('Dashboard load error:', error);
                alert('대시보드 로드 실패: ' + error.message);
            }
        }

        // 일별 차트
        function updateDailyChart(dailyStats) {
            const ctx = document.getElementById('dailyChart');

            if (dailyChart) {
                dailyChart.destroy();
            }

            const labels = dailyStats.reverse().map(d => d.day);
            const visitData = dailyStats.map(d => d.visit_count);
            const uniqueData = dailyStats.map(d => d.unique_ips);

            dailyChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '총 방문 수',
                            data: visitData,
                            borderColor: '#1e5ba8',
                            backgroundColor: 'rgba(30, 91, 168, 0.1)',
                            tension: 0.4
                        },
                        {
                            label: '순 방문자',
                            data: uniqueData,
                            borderColor: '#4caf50',
                            backgroundColor: 'rgba(76, 175, 80, 0.1)',
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'top',
                        }
                    }
                }
            });
        }

        // 디바이스 차트
        function updateDeviceChart(deviceStats) {
            const ctx = document.getElementById('deviceChart');

            if (deviceChart) {
                deviceChart.destroy();
            }

            deviceChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: deviceStats.map(d => d.device_type),
                    datasets: [{
                        data: deviceStats.map(d => d.count),
                        backgroundColor: ['#1e5ba8', '#4caf50', '#ff9800']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true
                }
            });
        }

        // 브라우저 차트
        function updateBrowserChart(browserStats) {
            const ctx = document.getElementById('browserChart');

            if (browserChart) {
                browserChart.destroy();
            }

            browserChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: browserStats.map(d => d.browser),
                    datasets: [{
                        data: browserStats.map(d => d.count),
                        backgroundColor: ['#1e5ba8', '#4caf50', '#ff9800', '#e91e63', '#9c27b0']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true
                }
            });
        }

        // 인기 페이지 테이블
        function updateTopPagesTable(topPages) {
            const tbody = document.querySelector('#topPagesTable tbody');
            tbody.innerHTML = '';

            topPages.forEach((page, index) => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${page.path}</td>
                    <td>${page.visit_count.toLocaleString()}</td>
                    <td>${page.unique_visitors.toLocaleString()}</td>
                `;
            });
        }

        // 최근 로그 조회
        async function loadRecentLogs() {
            try {
                const response = await fetch('/api/v1/access-logs/logs?limit=20');
                const result = await response.json();

                if (!result.success) {
                    throw new Error('로그 조회 실패');
                }

                const tbody = document.querySelector('#recentLogsTable tbody');
                tbody.innerHTML = '';

                result.data.forEach(log => {
                    const row = tbody.insertRow();
                    const deviceClass = `badge-${log.device_type.toLowerCase()}`;

                    row.innerHTML = `
                        <td>${new Date(log.timestamp).toLocaleString('ko-KR')}</td>
                        <td>${log.user_name || log.user_id || '비회원'}</td>
                        <td>${log.ip_address}</td>
                        <td><span class="badge ${deviceClass}">${log.device_type}</span></td>
                        <td>${log.path}</td>
                        <td>${log.response_time_ms}ms</td>
                    `;
                });

            } catch (error) {
                console.error('Recent logs load error:', error);
            }
        }

        // CSV 내보내기
        async function exportToCSV() {
            const days = document.getElementById('period').value;

            try {
                const response = await fetch(`/api/v1/access-logs/logs?limit=10000`);
                const result = await response.json();

                if (!result.success) {
                    throw new Error('데이터 조회 실패');
                }

                // CSV 생성
                const headers = ['시간', '사용자ID', '이름', 'IP', '메서드', '경로', '디바이스', '브라우저', 'OS', '응답시간'];
                let csv = headers.join(',') + '\n';

                result.data.forEach(log => {
                    const row = [
                        log.timestamp,
                        log.user_id || '',
                        log.user_name || '',
                        log.ip_address,
                        log.method,
                        log.path,
                        log.device_type,
                        log.browser,
                        log.os,
                        log.response_time_ms
                    ];
                    csv += row.join(',') + '\n';
                });

                // 다운로드
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `access_logs_${new Date().toISOString().split('T')[0]}.csv`;
                link.click();

            } catch (error) {
                console.error('CSV export error:', error);
                alert('CSV 내보내기 실패: ' + error.message);
            }
        }

        // 초기 로드
        document.addEventListener('DOMContentLoaded', () => {
            loadDashboard();
            // 5분마다 자동 새로고침
            setInterval(loadDashboard, 5 * 60 * 1000);
        });
    </script>
</body>
</html>
