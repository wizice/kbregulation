{% extends "common/base.html" %}

{% block styles %}
<link rel="stylesheet" href="/static/styles.css">
<link rel="stylesheet" href="/static/css/font-awesome.min.css">
<style>
    body {
        background: #f8f9fa;
        margin: 0;
        padding: 0;
    }

    .page-container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
        background: white;
    }

    .toolbar {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 15px;
    }

    .filter-group {
        display: flex;
        gap: 10px;
        align-items: center;
    }

    select.filter-select {
        padding: 10px 15px;
        border: 2px solid #e1e8ed;
        border-radius: 8px;
        font-size: 14px;
        min-width: 150px;
    }

    .table-container {
        background: white;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        overflow: hidden;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    thead {
        background: #f7fafc;
        border-bottom: 2px solid #e2e8f0;
    }

    th {
        padding: 15px;
        text-align: left;
        font-weight: 600;
        color: #2d3748;
        font-size: 14px;
    }

    td {
        padding: 15px;
        border-bottom: 1px solid #e2e8f0;
        font-size: 14px;
    }

    tbody tr:hover {
        background: #f7fafc;
    }

    .badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 500;
    }

    .badge-notice {
        background: #fff3e0;
        color: #e65100;
    }

    .badge-procedure {
        background: #e3f2fd;
        color: #1976d2;
    }

    .badge-usage {
        background: #f3e5f5;
        color: #7b1fa2;
    }

    .badge-faq {
        background: #e8f5e9;
        color: #388e3c;
    }

    .badge-active {
        background: #4caf50;
        color: white;
    }

    .badge-inactive {
        background: #9e9e9e;
        color: white;
    }

    .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.3s;
    }

    .btn-primary {
        background: #667eea;
        color: white;
    }

    .btn-primary:hover {
        background: #5568d3;
    }

    .btn-secondary {
        background: #6c757d;
        color: white;
    }

    .btn-secondary:hover {
        background: #5a6268;
    }

    .btn-danger {
        background: #f44336;
        color: white;
    }

    .btn-sm {
        padding: 6px 12px;
        font-size: 12px;
    }

    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        z-index: 1000;
        justify-content: center;
        align-items: center;
    }

    .modal.active {
        display: flex;
    }

    .modal-content {
        background: white;
        border-radius: 10px;
        width: 90%;
        max-width: 800px;
        max-height: 90vh;
        overflow-y: auto;
    }

    .modal-header {
        padding: 20px;
        border-bottom: 1px solid #e2e8f0;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .modal-body {
        padding: 20px;
    }

    .modal-footer {
        padding: 15px 20px;
        border-top: 1px solid #e2e8f0;
        display: flex;
        justify-content: flex-end;
        gap: 10px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #2d3748;
    }

    .form-input, .form-select, .form-textarea {
        width: 100%;
        padding: 10px;
        border: 2px solid #e1e8ed;
        border-radius: 8px;
        font-size: 14px;
    }

    .form-textarea {
        min-height: 200px;
        resize: vertical;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
        outline: none;
        border-color: #667eea;
    }

    .required {
        color: #f44336;
    }

    .clickable {
        cursor: pointer;
        color: #667eea;
    }

    .clickable:hover {
        text-decoration: underline;
    }

    .tab-button {
        padding: 12px 24px;
        border: none;
        background: transparent;
        border-bottom: 3px solid transparent;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        color: #718096;
        transition: all 0.3s;
    }

    .tab-button:hover {
        color: #667eea;
        background: #f7fafc;
    }

    .tab-button.active {
        color: #667eea;
        border-bottom-color: #667eea;
        background: #f7fafc;
    }

    .tab-button i {
        margin-right: 6px;
    }
</style>
{% endblock %}

{% block content %}
<div class="page-container">
    <h2 style="margin-bottom: 2rem;">지원 탭 관리</h2>

    <!-- 탭 네비게이션 -->
    <div style="margin-bottom: 20px; border-bottom: 2px solid #e2e8f0;">
        <div style="display: flex; gap: 5px;">
            <button class="tab-button active" onclick="SupportManager.switchTab('notice')" data-tab="notice">
                <i class="fas fa-bullhorn"></i> 공지사항
            </button>
            <button class="tab-button" onclick="SupportManager.switchTab('procedure')" data-tab="procedure">
                <i class="fas fa-file-alt"></i> 제개정절차
            </button>
            <button class="tab-button" onclick="SupportManager.switchTab('usage')" data-tab="usage">
                <i class="fas fa-question-circle"></i> 사용방법
            </button>
            <button class="tab-button" onclick="SupportManager.switchTab('faq')" data-tab="faq">
                <i class="fas fa-comments"></i> FAQ
            </button>
        </div>
    </div>

    <!-- 툴바 -->
    <div class="toolbar">
        <div class="filter-group">
            <select class="filter-select" id="statusFilter" onchange="SupportManager.loadPages()">
                <option value="true">활성</option>
                <option value="false">비활성</option>
                <option value="">전체</option>
            </select>
        </div>
        <button class="btn btn-primary" onclick="SupportManager.openCreateModal()">
            <i class="fas fa-plus"></i> 새 페이지 추가
        </button>
    </div>

    <!-- 테이블 -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th width="10%">ID</th>
                    <th width="15%">유형</th>
                    <th width="30%">제목</th>
                    <th width="10%">순서</th>
                    <th width="10%">조회수</th>
                    <th width="10%">상태</th>
                    <th width="15%">작업</th>
                </tr>
            </thead>
            <tbody id="pagesList">
                <tr>
                    <td colspan="7" style="text-align: center; padding: 40px;">
                        로딩 중...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- 생성/수정 모달 -->
<div class="modal" id="pageModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">페이지 추가</h3>
            <button onclick="SupportManager.closeModal()" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
        </div>
        <div class="modal-body">
            <form id="pageForm">
                <div class="form-group">
                    <label class="form-label">유형 <span class="required">*</span></label>
                    <select class="form-select" id="pageType" required>
                        <option value="">선택하세요</option>
                        <option value="notice">공지사항</option>
                        <option value="procedure">제개정절차</option>
                        <option value="usage">사용방법</option>
                        <option value="faq">FAQ</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">제목 <span class="required">*</span></label>
                    <input type="text" class="form-input" id="pageTitle" required>
                </div>

                <div class="form-group">
                    <label class="form-label">내용 <span class="required">*</span></label>
                    <textarea class="form-textarea" id="pageContent" required></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">정렬 순서</label>
                    <input type="number" class="form-input" id="orderNo" value="0" min="0">
                    <small style="color: #666;">숫자가 작을수록 먼저 표시됩니다</small>
                </div>

                <div class="form-group">
                    <label class="form-label">첨부파일</label>
                    <input type="file" id="attachment" style="display: block; margin-bottom: 10px;">
                    <div id="currentAttachment" style="display: none; padding: 10px; background: #f7fafc; border-radius: 6px;">
                        <span id="attachmentName"></span>
                        <button type="button" class="btn btn-sm btn-danger" onclick="SupportManager.removeAttachment()">
                            <i class="fas fa-trash"></i> 삭제
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="isActive" checked>
                        <span>활성 상태</span>
                    </label>
                </div>

                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="isImportant">
                        <span>중요 표시</span>
                    </label>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="SupportManager.closeModal()">취소</button>
            <button class="btn btn-primary" onclick="SupportManager.savePage()">저장</button>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script src="/static/js/admin-support.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    SupportManager.init();
});
</script>
{% endblock %}
