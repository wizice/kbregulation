<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인쇄 기능 제어 테스트</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .info-box {
            background: #f0f4f8;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        .info-box h2 {
            color: #667eea;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 600;
            color: #333;
        }

        .info-value {
            color: #666;
            font-family: monospace;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-allowed {
            background: #d4edda;
            color: #155724;
        }

        .status-blocked {
            background: #f8d7da;
            color: #721c24;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #666;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .test-results {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .test-results.show {
            display: block;
        }

        .test-results h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .log-item {
            padding: 8px 12px;
            margin-bottom: 5px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 13px;
        }

        .log-info {
            background: #d1ecf1;
            color: #0c5460;
        }

        .log-warn {
            background: #fff3cd;
            color: #856404;
        }

        .log-success {
            background: #d4edda;
            color: #155724;
        }

        .allowed-domains {
            background: #e7f3ff;
            border: 2px solid #0066cc;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .allowed-domains h3 {
            color: #0066cc;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .domain-list {
            list-style: none;
            padding: 0;
        }

        .domain-list li {
            padding: 8px 0;
            color: #333;
            font-family: monospace;
        }

        .domain-list li:before {
            content: "✓ ";
            color: #28a745;
            font-weight: bold;
            margin-right: 8px;
        }

        @media print {
            body::after {
                content: "대외비 - 테스트 페이지";
                position: fixed;
                top: 10px;
                right: 20px;
                color: #dc3545;
                font-size: 14px;
                font-weight: bold;
                padding: 5px 10px;
                border: 2px solid #dc3545;
                border-radius: 5px;
                background: white;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖨️ 인쇄 기능 제어 테스트</h1>
        <p class="subtitle">도메인별 인쇄 기능 제어 시스템 테스트 페이지</p>

        <div class="info-box">
            <h2>📊 현재 상태</h2>
            <div class="info-item">
                <span class="info-label">현재 도메인:</span>
                <span class="info-value" id="currentDomain">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">인쇄 기능 상태:</span>
                <span id="printStatus">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">브라우저:</span>
                <span class="info-value" id="browserInfo">-</span>
            </div>
        </div>

        <div class="allowed-domains">
            <h3>✅ 인쇄가 허용된 도메인</h3>
            <ul class="domain-list">
                <li>policy.wizice.com</li>
                <li>policy-internal.yuhs.ac</li>
                <li>localhost</li>
                <li>127.0.0.1</li>
            </ul>
        </div>

        <div class="button-group">
            <button class="btn btn-primary print-btn" id="printBtn" onclick="testPrint()">
                🖨️ 인쇄 테스트
            </button>
            <button class="btn btn-secondary" onclick="clearLogs()">
                🗑️ 로그 지우기
            </button>
        </div>

        <div class="test-results" id="testResults">
            <h3>📝 테스트 로그</h3>
            <div id="logContainer"></div>
        </div>
    </div>

    <script>
        // ========== 도메인별 기능 제어 설정 ==========
        const DOMAIN_CONFIG = {
            // 인쇄 기능이 허용된 도메인 목록
            printAllowedDomains: [
                'policy.wizice.com',
                'policy-internal.yuhs.ac',
                'localhost',           // 개발 환경
                '127.0.0.1'           // 개발 환경
            ]
        };

        // 현재 도메인 확인
        function getCurrentDomain() {
            return window.location.hostname;
        }

        // 도메인에서 인쇄 기능 사용 가능 여부 체크
        function isPrintAllowed() {
            const currentDomain = getCurrentDomain();
            const isAllowed = DOMAIN_CONFIG.printAllowedDomains.includes(currentDomain);
            addLog(`현재 도메인: ${currentDomain}, 인쇄 허용: ${isAllowed}`, isAllowed ? 'info' : 'warn');
            return isAllowed;
        }

        // 로그 추가
        function addLog(message, type = 'info') {
            const logContainer = document.getElementById('logContainer');
            const logItem = document.createElement('div');
            logItem.className = `log-item log-${type}`;

            const timestamp = new Date().toLocaleTimeString();
            logItem.textContent = `[${timestamp}] ${message}`;

            logContainer.appendChild(logItem);
            document.getElementById('testResults').classList.add('show');

            // 스크롤 맨 아래로
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // 로그 지우기
        function clearLogs() {
            document.getElementById('logContainer').innerHTML = '';
            document.getElementById('testResults').classList.remove('show');
            addLog('로그가 초기화되었습니다.', 'info');
        }

        // 인쇄 테스트 함수
        function testPrint() {
            addLog('인쇄 기능 테스트 시작', 'info');

            if (!isPrintAllowed()) {
                alert('이 도메인에서는 인쇄 기능을 사용할 수 없습니다.\n\n허용된 도메인:\n- policy.wizice.com\n- policy-internal.yuhs.ac\n- localhost\n- 127.0.0.1');
                addLog('❌ 인쇄 기능이 차단되었습니다.', 'warn');
                return false;
            }

            addLog('✅ 인쇄가 허용된 도메인입니다.', 'success');
            addLog('인쇄 창을 엽니다...', 'info');
            window.print();
        }

        // 페이지 로드 시 초기화
        document.addEventListener('DOMContentLoaded', function() {
            // 현재 상태 표시
            const currentDomain = getCurrentDomain();
            const isAllowed = isPrintAllowed();

            document.getElementById('currentDomain').textContent = currentDomain;

            const statusBadge = document.createElement('span');
            statusBadge.className = `status-badge ${isAllowed ? 'status-allowed' : 'status-blocked'}`;
            statusBadge.textContent = isAllowed ? '✅ 허용됨' : '❌ 차단됨';
            document.getElementById('printStatus').appendChild(statusBadge);

            document.getElementById('browserInfo').textContent = navigator.userAgent.split(' ').slice(-2).join(' ');

            // 인쇄 버튼 제어
            const printButton = document.querySelector('.print-btn');
            if (printButton) {
                if (!isAllowed) {
                    // 인쇄가 허용되지 않은 도메인: 버튼 비활성화 (숨기지 않고 시각적으로 표시)
                    printButton.disabled = true;
                    printButton.textContent = '🚫 인쇄 불가';
                    addLog('인쇄 버튼이 비활성화되었습니다.', 'warn');
                } else {
                    addLog('인쇄 버튼이 활성화되었습니다.', 'success');
                }
            }

            addLog('페이지 로드 완료', 'info');
        });

        // 키보드 단축키 (Ctrl+P)
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'p') {
                e.preventDefault();

                addLog('Ctrl+P 단축키 감지', 'info');

                if (isPrintAllowed()) {
                    addLog('✅ 인쇄 단축키 허용', 'success');
                    window.print();
                } else {
                    alert('이 도메인에서는 인쇄 기능을 사용할 수 없습니다.\n\n허용된 도메인:\n- policy.wizice.com\n- policy-internal.yuhs.ac\n- localhost\n- 127.0.0.1');
                    addLog('❌ 인쇄 단축키가 차단되었습니다.', 'warn');
                }
            }
        });

        // Console에도 상태 출력
        console.log('%c[Print Control Test]', 'color: #667eea; font-weight: bold; font-size: 14px;');
        console.log('현재 도메인:', getCurrentDomain());
        console.log('인쇄 허용:', isPrintAllowed());
        console.log('허용된 도메인:', DOMAIN_CONFIG.printAllowedDomains);
    </script>
</body>
</html>
